<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>POST Test</title>
</head>
<body>
  <h2>POST test</h2>
  <p>Tap the button to send a test POST to your webhook.</p>
  <button id="sendBtn">Send test POST</button>

  <script>
    document.getElementById('sendBtn').addEventListener('click', function () {
      const payload = {
        test: "github-pages-post-test",
        time: new Date().toISOString(),
        page: window.location.href,
        ua: navigator.userAgent
      };

      fetch("https://webhook.site/redirect/f6fa034f-dd95-4933-8d07-803ff5c0ba0a", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      })
      .then(response => {
        alert("POST sent. Check Webhook.site inbox.");
      })
      .catch(err => {
        console.error("POST failed", err);
        alert("POST failed. See console for details.");
      });
    });
  </script>
</body>
</html>
